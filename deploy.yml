name: 🚀 Deploy to harmaalwale.com

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🚀 Trigger cPanel Git Deploy
        run: |
          echo "Calling cPanel API..."
          RESPONSE=$(curl -s -k -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://cp-ht-2.webhostbox.net:2083/execute/VersionControl/update?repository_root=/home1/harmakko/repositories/harmaalwale.com")
          echo "$RESPONSE"
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ cPanel deploy triggered successfully!"
          else
            echo "❌ cPanel API returned: $HTTP_STATUS"
            exit 1
          fi

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HarmaalWale – Deploy Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111;color:#fff;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
  .bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(232,112,0,0.15),transparent 70%);border-radius:50%;animation:pulse 3s ease-in-out infinite;pointer-events:none;}
  @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.2);}}
  .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:50px 60px;text-align:center;max-width:600px;width:90%;position:relative;z-index:2;animation:slideUp 0.6s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
  .status-ring{width:100px;height:100px;border-radius:50%;border:3px solid #E87000;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:spin-ring 2s linear infinite;box-shadow:0 0 30px rgba(232,112,0,0.4);}
  @keyframes spin-ring{0%{box-shadow:0 0 30px rgba(232,112,0,0.4);}50%{box-shadow:0 0 60px rgba(232,112,0,0.8);}100%{box-shadow:0 0 30px rgba(232,112,0,0.4);}}
  .status-icon{font-size:48px;}
  h1{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;text-transform:uppercase;line-height:1;margin-bottom:8px;}
  h1 span{color:#E87000;}
  .subtitle{color:#666;font-size:15px;margin-bottom:32px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#2a2a2a;border-radius:12px;overflow:hidden;margin-bottom:28px;}
  .stat{background:#111;padding:18px 10px;text-align:center;}
  .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#E87000;}
  .stat-lbl{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
  .info-box{background:#111;border:1px solid #222;border-radius:10px;padding:14px 16px;text-align:left;}
  .info-box label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
  .info-box span{font-size:13px;color:#ccc;font-weight:600;}
  .ping-btn{background:#E87000;color:#fff;border:none;padding:14px 36px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;width:100%;}
  .ping-btn:hover{background:#ff8c1a;transform:translateY(-2px);}
  .ping-btn:active{transform:translateY(0);}
  .ping-result{margin-top:14px;font-size:13px;color:#4CAF50;min-height:20px;transition:all 0.3s;}
  .ping-result.error{color:#ff4444;}
  .ticker{margin-top:20px;font-size:11px;color:#333;letter-spacing:1px;}
  .ticker span{color:#E87000;}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <div class="status-ring"><div class="status-icon">✅</div></div>
  <h1>Deploy <span>Works!</span></h1>
  <p class="subtitle">harmaalwale.com is live and auto-deploying correctly</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="deploy-time">—</div>
      <div class="stat-lbl">Deploy Time</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="load-time">—</div>
      <div class="stat-lbl">Page Load</div>
    </div>
    <div class="stat">
      <div class="stat-val">✅</div>
      <div class="stat-lbl">Status</div>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-box">
      <label>Deployed At</label>
      <span id="deploy-date">—</span>
    </div>
    <div class="info-box">
      <label>Your IP</label>
      <span id="user-ip">Loading...</span>
    </div>
    <div class="info-box">
      <label>Browser</label>
      <span id="browser">—</span>
    </div>
    <div class="info-box">
      <label>Server</label>
      <span>harmaalwale.com</span>
    </div>
  </div>

  <button class="ping-btn" onclick="pingServer()">🏓 Ping Server</button>
  <div class="ping-result" id="ping-result"></div>

  <div class="ticker">Last updated: <span id="last-updated">just now</span></div>
</div>

<script>
  // Page load time
  window.addEventListener('load', () => {
    const t = performance.now().toFixed(0);
    document.getElementById('load-time').textContent = t + 'ms';
  });

  // Deploy date (file last modified approximation)
  const now = new Date();
  document.getElementById('deploy-date').textContent = now.toLocaleString('en-IN', {
    day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  document.getElementById('deploy-time').textContent = '~20s';

  // Browser
  const ua = navigator.userAgent;
  let browser = 'Unknown';
  if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
  else if (ua.includes('Firefox')) browser = 'Firefox';
  else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
  else if (ua.includes('Edg')) browser = 'Edge';
  document.getElementById('browser').textContent = browser;

  // User IP
  fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(d => document.getElementById('user-ip').textContent = d.ip)
    .catch(() => document.getElementById('user-ip').textContent = 'N/A');

  // Live clock
  setInterval(() => {
    const s = Math.floor((Date.now() - performance.timeOrigin) / 1000);
    document.getElementById('last-updated').textContent = s + 's ago';
  }, 1000);

  // Ping
  async function pingServer() {
    const btn = document.querySelector('.ping-btn');
    const res = document.getElementById('ping-result');
    btn.textContent = '⏳ Pinging...';
    btn.disabled = true;
    res.className = 'ping-result';
    res.textContent = '';
    const start = Date.now();
    try {
      await fetch(location.origin + '/robots.txt?t=' + Date.now(), {cache:'no-store'});
      const ms = Date.now() - start;
      res.textContent = '✅ Server responded in ' + ms + 'ms — all good!';
      res.className = 'ping-result';
    } catch(e) {
      res.textContent = '❌ Server unreachable';
      res.className = 'ping-result error';
    }
    btn.textContent = '🏓 Ping Server';
    btn.disabled = false;
  }
</script>
</body>
</html>

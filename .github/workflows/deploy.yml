name: 🚀 Deploy to harmaalwale.com

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 SSH Deploy to cPanel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 -H 192.185.129.210 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o KexAlgorithms=+diffie-hellman-group-exchange-sha256 \
            -o HostKeyAlgorithms=+ssh-rsa \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa \
            harmakko@192.185.129.210 \
            "cd /home1/harmakko/repositories/harmaalwale.com && \
             git pull origin main && \
             cp -rf . /home1/harmakko/public_html/ && \
             rm -rf /home1/harmakko/public_html/.git && \
             rm -rf /home1/harmakko/public_html/.github && \
             rm -f /home1/harmakko/public_html/deploy.bat && \
             rm -f /home1/harmakko/public_html/.cpanel.yml && \
             rm -f /home1/harmakko/public_html/*.rar && \
             rm -f /home1/harmakko/public_html/*.7z && \
             echo Deployed at \$(date)"
